<!DOCTYPE html>
<html>
<head>
  <title>Task Manager Login</title>
  <link rel="stylesheet" href="./styles.css">
</head>

<body class="auth-body">

<div class="auth-container">

  <div class="auth-box">

    <h2>Task Manager</h2>
    <p class="subtitle">Manage tasks like a pro 🚀</p>

    <input id="email" placeholder="Enter Email">
    <input id="password" type="password" placeholder="Enter Password">

    <button onclick="login()">Login</button>

    <p class="switch-text">
      Don’t have an account?
      <span onclick="showSignup()">Sign up</span>
    </p>

  </div>

  <!-- SIGNUP BOX -->
  <div class="auth-box" id="signupBox" style="display:none;">

    <h2>Create Account</h2>

    <input id="sname" placeholder="Enter Name">
    <input id="semail" placeholder="Enter Email">
    <input id="spassword" type="password" placeholder="Enter Password">

    <button onclick="signup()">Sign Up</button>

    <p class="switch-text">
      Already have an account?
      <span onclick="showLogin()">Login</span>
    </p>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
